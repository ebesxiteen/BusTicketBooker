spring.datasource.url=jdbc:mysql://mysql:3306/ticketbooker?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Bangkok
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}

spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false

spring.web.resources.cache.period=7d
spring.web.resources.chain.cache=true

spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:8000/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.facebook.redirect-uri=http://localhost:8000/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.github.redirect-uri=http://localhost:8000/login/oauth2/code/{registrationId}

vnpay.returnUrl=http://localhost:8000/vnpay-return

spring.ai.openai.api-key=${SPRING_AI_OPENAI_API_KEY:${OPENAI_API_KEY}}
spring.ai.openai.base-url=${SPRING_AI_OPENAI_BASE_URL:https://api.openai.com}
spring.ai.openai.chat.options.model=${SPRING_AI_OPENAI_CHAT_OPTIONS_MODEL:gpt-4o-mini}
