spring.application.name=greenbus-test

spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.url=jdbc:h2:mem:ticketbooker;MODE=MySQL;DATABASE_TO_UPPER=false;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

app.scheduling.enabled=false

logging.level.root=WARN
logging.level.com.example.ticketbooker.Util.GlobalExceptionHandler=OFF

spring.mail.host=localhost
spring.mail.port=2525
spring.mail.username=test@example.com
spring.mail.password=dummy

spring.ai.openai.api-key=dummy-test-key
spring.ai.openai.base-url=https://example.com
spring.ai.openai.chat.options.model=llama3-8b-8192

spring.security.oauth2.client.registration.google.client-id=dummy-google-client-id
spring.security.oauth2.client.registration.google.client-secret=dummy-google-client-secret
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.registration.facebook.client-id=dummy-facebook-client-id
spring.security.oauth2.client.registration.facebook.client-secret=dummy-facebook-client-secret
spring.security.oauth2.client.registration.facebook.scope=public_profile,email
spring.security.oauth2.client.registration.github.client-id=dummy-github-client-id
spring.security.oauth2.client.registration.github.client-secret=dummy-github-client-secret
spring.security.oauth2.client.registration.github.scope=read:user,user:email

DB_PASSWORD=dummy
MAIL_PASSWORD=dummy
GOOGLE_CLIENT_ID=dummy-google-client-id
GOOGLE_CLIENT_SECRET=dummy-google-client-secret
FACEBOOK_CLIENT_ID=dummy-facebook-client-id
FACEBOOK_CLIENT_SECRET=dummy-facebook-client-secret
GITHUB_CLIENT_ID=dummy-github-client-id
GITHUB_CLIENT_SECRET=dummy-github-client-secret
VNPAY_TMN_CODE=dummy-vnpay-tmn-code
VNPAY_HASH_SECRET=dummy-vnpay-hash-secret
ZALO_APP_ID=dummy-zalo-app-id
ZALO_KEY1=dummy-zalo-key1
OPENAI_API_KEY=dummy-openai-api-key

zalo.appId=dummy-zalo-app-id
zalo.key1=dummy-zalo-key1
zalo.expireDuration=600
zalo.createEndpoint=https://example.com/zalo/create
zalo.queryEndpoint=https://example.com/zalo/query
